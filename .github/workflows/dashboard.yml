name: Actualizar Dashboard Macro-Cripto

on:
  schedule:
    - cron: '0 23 * * WED'
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repositorio
      uses: actions/checkout@v3
    
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Instalar dependencias
      run: |
        pip install requests --quiet
    
    - name: Ejecutar actualizador de dashboard
      run: python dashboard_updater.py
    
    - name: Guardar datos en repositorio
      uses: EndBug/add-and-commit@v9
      with:
        message: 'chore: actualizar datos del dashboard'
        add: 'dashboard_data.json'
        default_author: github_actions
      continue-on-error: true
